name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ==========================================\
  # 任务 1: 代码质量检查 (使用 Python 3.11 保证格式一致性)
  # ==========================================\
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装工具
        run: |
          pip install "black==24.10.0" "ruff==0.8.0" "mypy"
      
      - name: 检查代码格式 (black)
        run: black --fast --check .
      
      - name: 检查代码风格 (ruff)
        run: ruff check .
      
      - name: 类型检查 (mypy)
        run: mypy myAgent --ignore-missing-imports || true

  # ==========================================
  # 任务 2: 单元测试
  # ==========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: 安装依赖
        run: |
          pip install -e .[dev]
      
      - name: 运行测试
        run: pytest tests/ -v --tb=short --cov=myAgent --cov-report=xml
      
      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ==========================================
  # 任务 3: 构建 Wheel
  # ==========================================
  build:
    name: Build Wheel
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装构建工具
        run: pip install build
      
      - name: 获取版本号
        id: version
        run: |
          VERSION=$(python -c "import myAgent; print(myAgent.__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 版本号: $VERSION"
      
      - name: 构建 Wheel
        run: python -m build --wheel
      
      - name: 构建 Source 分发
        run: python -m build --sdist
      
      - name: 验证 Wheel
        run: |
          pip install dist/*.whl
          python -c "import myAgent; print(f'✅ myAgent {myAgent.__version__} 安装成功')"
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 7

  # ==========================================
  # 任务 4: 发布到 PyPI (仅 Release)
  # ==========================================
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/myagent-framework
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      
      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ==========================================
  # 任务 5: 发布到 TestPyPI (可选)
  # ==========================================
  publish-test:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/myagent-framework
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      
      - name: 发布到 TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
